name: Actualitzar web i publicar

on:
  push:
    branches: [main]
    paths:
      - 'site/**/*.xlsx'
      - 'site/**/*.py'
      - 'site/**/*.html'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Descarregar el repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: pip install openpyxl

      - name: Executar actualitzar.py
        run: python actualitzar.py
        working-directory: site

      - name: Preparar carpeta de publicació
        run: |
          mkdir -p _site
          cp -r site/* _site/

      - name: Publicar a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
